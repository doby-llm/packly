<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>New Trip - Packly</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed-variant": "#004c6e",
                        "surface-container-high": "#e7e8e9",
                        "on-error": "#ffffff",
                        "surface-container": "#edeeef",
                        "secondary-container": "#9c7afe",
                        "tertiary-container": "#94d2ff",
                        "inverse-surface": "#2e3132",
                        "secondary": "#6844c7",
                        "on-background": "#191c1d",
                        "surface-dim": "#d9dadb",
                        "tertiary": "#006591",
                        "on-surface-variant": "#3b4a44",
                        "secondary-fixed-dim": "#cebdff",
                        "on-error-container": "#93000a",
                        "on-tertiary-container": "#005b84",
                        "on-surface": "#191c1d",
                        "surface-variant": "#e1e3e4",
                        "on-secondary-container": "#310082",
                        "surface-tint": "#006b57",
                        "error": "#ba1a1a",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed": "#c9e6ff",
                        "on-secondary": "#ffffff",
                        "on-primary-container": "#00614f",
                        "outline-variant": "#b9cac3",
                        "on-primary-fixed": "#002019",
                        "background": "#f8f9fa",
                        "on-tertiary-fixed": "#001e2f",
                        "on-secondary-fixed-variant": "#5028ae",
                        "inverse-on-surface": "#f0f1f2",
                        "surface-container-low": "#f3f4f5",
                        "primary-container": "#00e5bc",
                        "secondary-fixed": "#e8ddff",
                        "primary-fixed": "#42fdd3",
                        "primary-fixed-dim": "#00e0b8",
                        "primary": "#006b57",
                        "error-container": "#ffdad6",
                        "outline": "#6b7b74",
                        "on-primary-fixed-variant": "#005141",
                        "on-secondary-fixed": "#21005e",
                        "surface-bright": "#f8f9fa",
                        "inverse-primary": "#00e0b8",
                        "tertiary-fixed-dim": "#89ceff",
                        "surface-container-highest": "#e1e3e4",
                        "surface": "#f8f9fa",
                        "on-primary": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.5rem",
                        "sm": "0.25rem",
                        "md": "0.75rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "display": ["Plus Jakarta Sans"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"],
                        "sans": ["Plus Jakarta Sans", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .material-symbols-outlined.fill { font-variation-settings: 'FILL' 1; }
        
        /* Custom Input Focus Ring */
        .input-focus:focus-within {
            border-color: #00e0b8; /* primary-fixed-dim */
            box-shadow: 0 0 0 4px rgba(0, 224, 184, 0.15);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center">
<!-- Mobile Container -->
<div class="w-full max-w-md min-h-screen bg-surface-container-lowest flex flex-col relative shadow-[0_0_40px_rgba(0,0,0,0.05)] overflow-hidden">
<!-- Header (Transactional - No Global Nav) -->
<header class="flex justify-between items-center px-4 py-4 sticky top-0 bg-surface-container-lowest/90 backdrop-blur-md z-10">
<button class="w-10 h-10 flex items-center justify-center rounded-full text-on-surface-variant hover:bg-surface-container-low transition-colors active:scale-95">
<span class="material-symbols-outlined">close</span>
</button>
<!-- Progress Indicator -->
<div class="flex items-center gap-2"><div class="w-8 h-1.5 rounded-full bg-primary-fixed-dim"></div><div class="w-8 h-1.5 rounded-full bg-surface-container"></div><div class="w-8 h-1.5 rounded-full bg-surface-container"></div><div class="w-8 h-1.5 rounded-full bg-surface-container"></div></div>
<div class="w-10 h-10"></div> <!-- Spacer for balance -->
</header>
<!-- Main Content Canvas -->
<main class="flex-1 px-6 pt-6 pb-24 flex flex-col">
<!-- Contextual Header -->
<div class="mb-10 animate-fade-in-up">
<p class="text-primary-fixed-dim font-bold text-xs tracking-wider uppercase mb-2">Step 1 of 4</p>
<h1 class="text-[32px] font-extrabold leading-tight tracking-tight text-on-surface mb-2">
                    Let's start your new trip
                </h1>
<p class="text-on-surface-variant text-base">
                    Give your journey a name and tell us where you're headed.
                </p>
</div>
<!-- Form Area -->
<div class="flex flex-col gap-6">
<!-- Trip Name Input -->
<div class="relative group">
<label class="block text-sm font-semibold text-on-surface mb-2 transition-colors group-focus-within:text-primary-fixed-dim" for="tripName">
                        Trip Name
                    </label>
<div class="relative input-focus rounded-xl border border-outline-variant bg-surface-container-lowest transition-all duration-200">
<input autofocus="" class="w-full px-4 py-4 text-lg bg-transparent border-none rounded-xl focus:ring-0 placeholder:text-outline-variant text-on-surface font-semibold" id="tripName" placeholder="e.g., Summer in Mallorca" type="text">
</div>
</div>
<!-- Destination Input -->
<div class="relative group">
<label class="block text-sm font-semibold text-on-surface mb-2 transition-colors group-focus-within:text-primary-fixed-dim" for="destination">
                        Destination <span class="text-outline font-normal ml-1">(Optional)</span>
</label>
<div class="relative input-focus rounded-xl border border-outline-variant bg-surface-container-lowest flex items-center transition-all duration-200">
<span class="material-symbols-outlined text-outline-variant ml-4 group-focus-within:text-primary-fixed-dim transition-colors">location_on</span>
<input class="w-full px-3 py-4 text-lg bg-transparent border-none rounded-xl focus:ring-0 placeholder:text-outline-variant text-on-surface" id="destination" placeholder="Where to?" type="text">
</div>
</div>
<!-- Suggested Destinations (Vibrant Minimalism feature) -->
<div class="mt-2">
<p class="text-xs font-semibold text-outline mb-3 uppercase tracking-wider">Recent Searches</p>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-full bg-secondary-fixed/50 text-on-secondary-fixed-variant text-sm font-medium hover:bg-secondary-fixed transition-colors border border-secondary-fixed-dim/30">
                            Paris, FR
                        </button>
<button class="px-4 py-2 rounded-full bg-tertiary-fixed/50 text-on-tertiary-fixed-variant text-sm font-medium hover:bg-tertiary-fixed transition-colors border border-tertiary-fixed-dim/30">
                            Tokyo, JP
                        </button>
<button class="px-4 py-2 rounded-full bg-surface-container text-on-surface-variant text-sm font-medium hover:bg-surface-container-high transition-colors border border-outline-variant/30">
                            + Current Location
                        </button>
</div>
</div>
</div>
<!-- Visual Element to fill space and add energy -->
<div class="mt-auto flex-1 flex items-center justify-center pointer-events-none opacity-40">
<div class="w-64 h-64 rounded-full bg-primary-fixed-dim blur-[100px] absolute -right-20 top-1/3 mix-blend-multiply"></div>
<div class="w-64 h-64 rounded-full bg-secondary-container blur-[100px] absolute -left-20 bottom-1/4 mix-blend-multiply"></div>
</div>
</main>
<!-- Bottom Action Area (Sticky) -->
<div class="p-6 bg-surface-container-lowest/80 backdrop-blur-xl border-t border-surface-container-highest fixed bottom-0 w-full max-w-md z-20">
<button class="w-full py-4 bg-primary text-on-primary rounded-xl font-bold text-lg shadow-[0_8px_16px_rgba(0,107,87,0.2)] hover:shadow-[0_12px_24px_rgba(0,107,87,0.3)] hover:-translate-y-0.5 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2 group opacity-50 pointer-events-none">
                Next
                <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</div>
<script>
        // Simple micro-interaction for input validation feel
        const tripInput = document.getElementById('tripName');
        const nextBtn = document.querySelector('button.bg-primary');

        tripInput.addEventListener('input', (e) => {
            if(e.target.value.length > 0) {
                nextBtn.classList.remove('opacity-50', 'pointer-events-none');
            } else {
                nextBtn.classList.add('opacity-50', 'pointer-events-none');
            }
        });
        
        // Initial state
        if(tripInput.value.length === 0) {
            nextBtn.classList.add('opacity-50', 'pointer-events-none');
        }
    </script>


</body></html>
